  start_final_copy:
    needs: [base-images]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch workflow in printminion/esp-gif-frame-firmware
        run: |
          curl -X POST https://api.github.com/repos/printminion/esp-gif-frame-firmware/actions/workflows/fetch_deploy.yml/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -u ${{ secrets.API_TOKEN_GITHUB }} \
          --data '{"ref": "gh_actions"}'
