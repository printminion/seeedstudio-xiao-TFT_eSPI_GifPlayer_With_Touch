name: Build_development

env:
    SOURCE_REPO: printminion/seeedstudio-xiao-TFT_eSPI_GifPlayer_With_Touch

on:
  workflow_dispatch:      # Start a workflow
  push:
    branches: development
    paths-ignore:
      - '.github/**'        # Ignore changes towards the .github directory
      - '**.md'             # Do no build if *.md files changes

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  base-images:
    runs-on: ubuntu-latest
    if: github.repository == env.SOURCE_REPO
    continue-on-error: true
    strategy:
      matrix:
        variant:
          - seeed_xiao_esp32c3
          - seeed_xiao_esp32s3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          pip install wheel
          pip install -U platformio
      - name: Add SHA to footer
        run: |
          COMMIT_SHA_LONG=$(git rev-parse --short HEAD || echo "")
          SHA=${COMMIT_SHA_LONG::7}
          sed -i -e "s/APP_SHA_SHORT/APP_SHA_SHORT $SHA-/g" ./src/include/version.h
      - name: Run PlatformIO
        run: platformio run -e ${{ matrix.variant }}
      - name: Upload firmware artifacts
        uses: jason2866/upload-artifact@v2.0.3
        with:
          name: firmware
          path: ./build_output

