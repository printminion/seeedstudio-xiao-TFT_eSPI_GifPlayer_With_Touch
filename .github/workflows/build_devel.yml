name: Build development

on:
  workflow_dispatch:      # Start a workflow
  push:
    branches:
      - development
    paths-ignore:
#      - '.github/**'        # Ignore changes towards the .github directory
      - '**.md'             # Do no build if *.md files changes

# Ensures that only one deploy task per branch/environment will run at a time.
concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  base_images:
    runs-on: ubuntu-latest

    if: github.repository == 'printminion/seeedstudio-xiao-TFT_eSPI_GifPlayer_With_Touch'
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        variant:
          - app_seeed_xiao_esp32c3-seeed_touch_104030087
          - app_seeed_xiao_esp32s3-seeed_touch_104030087

    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
          restore-keys: |
            ${{ runner.os }}-pio

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO Core
        run: |
            python -m pip install --upgrade pip
            pip install --upgrade platformio

      - name: Add SHA to footer
        run: |
          COMMIT_SHA_LONG=$(git rev-parse --short HEAD || echo "")
          SHA=${COMMIT_SHA_LONG::7}
          sed -i -e "s/APP_SHA_SHORT/APP_SHA_SHORT \"$SHA\"/g" ./src/include/version.h

      - name: Run PlatformIO
        id: build
        run: platformio run -e ${{ matrix.variant }}

      - name: Check build_output folder contents recursively
        run: ls -R ./build_output

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ./build_output

      - name: Show changes on failure
        if: failure()
        run: |
          git status
          git --no-pager diff
          exit 1 # make it red to grab attention

  # run start_final_copy only if base_images is successful
  start_final_copy:
    needs: [base_images]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch workflow in printminion/esp-gif-frame-firmware
        run: |
          curl -X POST https://api.github.com/repos/printminion/esp-gif-frame-firmware/actions/workflows/fetch_deploy.yml/dispatches \
          -H 'Accept: application/vnd.github.everest-preview+json' \
          -u ${{ secrets.API_TOKEN_GITHUB }} \
          --data '{"ref": "gh_actions"}'
