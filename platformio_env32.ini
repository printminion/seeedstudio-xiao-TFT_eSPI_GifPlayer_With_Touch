
[esp32_defaults]
build_unflags               = ${esp_defaults.build_unflags}
                              -mtarget-align
                              -Wswitch-unreachable
                              -Wstringop-overflow
                              -Wincompatible-pointer-types
                              -Wnonnull-compare
                              -fexceptions
                              -Wpointer-arith
build_flags                 = ${esp_defaults.build_flags}
                              ; comment next line to disable IPv6 support
                              -DUSE_IPV6
                              -mno-target-align
                              -Wno-switch-unreachable
                              -Wno-stringop-overflow
                              -fno-exceptions
                              -DBUFFER_LENGTH=128
                              -DHTTP_UPLOAD_BUFLEN=2048
                              -DMQTT_MAX_PACKET_SIZE=1200
                              -Duint32=uint32_t
                              -Duint16=uint16_t
                              -Duint8=uint8_t
                              -Dsint8_t=int8_t
                              -Dsint32_t=int32_t
                              -Dsint16_t=int16_t
                              -Dmemcpy_P=memcpy
                              -Dmemcmp_P=memcmp
                              ;for TLS we can afford compiling for 4K RSA keys
                              -DUSE_4K_RSA
                              -I$PROJECT_DIR/include
                              -include "sdkconfig.h"
;                              -include "esp32x_fixes.h"
                              ; wrappers for the crash-recorder
                              -Wl,--wrap=panicHandler -Wl,--wrap=xt_unhandled_exception
                              -Wl,--wrap=_Z11analogWritehi  ; `analogWrite(unsigned char, int)` use the Tasmota version of analogWrite for deeper integration and phase control
                              -Wl,--wrap=ledcReadFreq       ; `uint32_t ledcReadFreq(uint8_t chan)`
                              -Wl,--wrap=delay              ; void delay(uint32_t ms)
lib_ignore                  =
;                              HTTPUpdateServer
;                              USB
;                              NetBIOS
;                              Preferences
;                              ArduinoOTA
extra_scripts               = pre:pio-tools/add_c_flags.py
;                              pre:pio-tools/solidify-from-url.py
;                              pre:pio-tools/gen-berry-structures.py
                              post:pio-tools/post_esp32.py
                              ${esp_defaults.extra_scripts}
monitor_filters             = esp32_exception_decoder

[envapp32_base]
framework               = ${common.framework}
platform                = ${core32.platform}
platform_packages       = ${core32.platform_packages}
board_build.filesystem  = ${common.board_build.filesystem}
custom_unpack_dir       = ${common.custom_unpack_dir}
board_build.variants_dir = ${common.board_build.variants_dir}
board                   = esp32
monitor_speed           = ${common.monitor_speed}
monitor_echo            = ${common.monitor_echo}
upload_resetmethod      = ${common.upload_resetmethod}
check_skip_packages     = ${common.check_skip_packages}
extra_scripts           = ${esp32_defaults.extra_scripts}
monitor_filters         = ${esp32_defaults.monitor_filters}
build_unflags           = ${core32.build_unflags}
build_flags             = ${core32.build_flags}
lib_ldf_mode            = ${common.lib_ldf_mode}
lib_compat_mode         = ${common.lib_compat_mode}
#lib_extra_dirs          = ${common.lib_extra_dirs}
#                          lib/libesp32
#                          lib/libesp32_lvgl
lib_ignore              = ${esp32_defaults.lib_ignore}
; Add files to Filesystem for all env (global). Remove no files entry and add add a line with the file to include
; Example for adding the Partition Manager
; custom_files_upload =
; tasmota/berry/modules/Partition_Manager.tapp
custom_files_upload     = no_files

[core32]
;platform                    = https://github.com/tasmota/platform-espressif32/releases/download/2025.01.30/platform-espressif32.zip
platform                    = espressif32
platform_packages           =
build_unflags               = ${esp32_defaults.build_unflags}
build_flags                 = ${esp32_defaults.build_flags}


[env:app_seeed_xiao_esp32c3-seeed_touch_104030087]
extends = envapp32_base
board = seeed_xiao_esp32c3

[env:app_seeed_xiao_esp32s3-seeed_touch_104030087]
extends = envapp32_base
board = seeed_xiao_esp32s3
