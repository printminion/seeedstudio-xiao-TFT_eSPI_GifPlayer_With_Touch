; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
description                 = Provide ESP32 based devices with Web, MQTT and OTA firmware
src_dir                     = src

[scripts_defaults]
extra_scripts               = pre:pio-tools/pre_source_dir.py
                              pre:pio-tools/set_partition_table.py
                              pre:pio-tools/override_copy.py
                              pre:pio-tools/compress-html.py
                              post:pio-tools/strip-flags.py

[esp_defaults]
extra_scripts               = post:pio-tools/name-firmware.py
                              post:pio-tools/gzip-firmware.py
                              post:pio-tools/metrics-firmware.py
                              post:pio-tools/custom_target.py
                              ${scripts_defaults.extra_scripts}

[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
lib_deps = 
#  bodmer/TFT_eSPI@^2.5.43
#  file://./src/libraries/SeeedStudio_TFT_eSPI
#  file://./src/libraries/Seeed_Arduino_RoundDisplay
#  file://./src/libraries/SeeedStudio_lvgl
#  https://github.com/Seeed-Studio/Seeed_Arduino_RoundDisplay.git
  https://github.com/Seeed-Projects/SeeedStudio_lvgl.git
  https://github.com/Seeed-Projects/SeeedStudio_TFT_eSPI.git
#  vshymanskyy/Preferences@^2.1.0
#  tanakamasayuki/I2C_BM8563@^1.0.4
#  arduino-libraries/SD@^1.3.0
  bitbank2/AnimatedGIF@^2.1.1
  
build_flags =
#   -D LV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"
   -D LV_CONF_PATH="${PROJECT_LIBDEPS_DIR}/${PIOENV}/lvgl/lv_conf.h"
#  -D USER_SETUP_LOADED=1
#  -include $PROJECT_LIBDEPS_DIR/$PIOENV/TFT_eSPI/User_Setups/Setup66_Seeed_XIAO_Round.h

